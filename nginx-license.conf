server {
    server_name akatsukibot-license.duckdns.org;
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/akatsukibot-license.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/akatsukibot-license.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}
server {
    if ($host = akatsukibot-license.duckdns.org) {
        return 301 https://$host$request_uri;
    }
    listen 80;
    server_name akatsukibot-license.duckdns.org;
    return 404;
}
